name: HotOrNotV2
description: Adds an ELO based ranking system for performers and images
version: 2.2.0
url: https://github.com/lowgrade12/hot-or-not
ui:
  javascript:
    - hotOrNotV2.js
  css:
    - hotOrNotV2.css
settings:
  showBattleRankBadge:
    displayName: Show Battle Rank Badge
    description: Show a rank badge on individual performer pages. Enabled by default.
    type: BOOLEAN
  showStarRatingWidget:
    displayName: Show Star Rating Widget
    description: Show a star rating widget on performer cards. Enabled by default.
    type: BOOLEAN
  compactCard:
    displayName: Compact Card
    description: Disabled by default.
    type: BOOLEAN
  displayExtraImages:
    displayName: Display Extra Images
    description: Show up to 3 random scene images alongside the performer portrait. Disabled by default.
    type: BOOLEAN
